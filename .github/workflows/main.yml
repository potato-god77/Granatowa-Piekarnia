name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - chleb  # lub master, zależy jak nazywa się Twoja główna gałąź
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRANATOWA_PIEKARNIA }}'
          projectId: granatowa-piekarnia
          channelId: live
