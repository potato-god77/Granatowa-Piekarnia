name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - chleb  # Zmienione z main na chleb
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRANATOWA_PIEKARNIA }}'
          projectId: granatowa-piekarnia
          channelId: live
